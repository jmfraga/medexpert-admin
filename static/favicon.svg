<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0d1225"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#60a5fa" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#2a3050" stroke-width="4"/>

  <!-- Outer ring - subtle tech feel -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1e3050" stroke-width="1.5" stroke-dasharray="8 12"/>

  <!-- Brain outline - left hemisphere -->
  <path d="M256 130 C220 130, 170 155, 160 200 C150 240, 155 260, 170 285 C180 300, 175 320, 180 340 C185 358, 200 375, 230 380 C248 383, 256 378, 256 370"
        fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Brain outline - right hemisphere -->
  <path d="M256 130 C292 130, 342 155, 352 200 C362 240, 357 260, 342 285 C332 300, 337 320, 332 340 C327 358, 312 375, 282 380 C264 383, 256 378, 256 370"
        fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- Brain folds - left -->
  <path d="M200 185 C215 195, 240 190, 256 185" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M180 230 C200 245, 235 240, 256 232" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M185 275 C205 288, 238 282, 256 275" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M195 318 C215 328, 240 323, 256 318" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Brain folds - right -->
  <path d="M312 185 C297 195, 272 190, 256 185" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M332 230 C312 245, 277 240, 256 232" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M327 275 C307 288, 274 282, 256 275" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M317 318 C297 328, 272 323, 256 318" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Neural network nodes - amber accent dots -->
  <circle cx="180" cy="200" r="6" fill="url(#accent)"/>
  <circle cx="332" cy="200" r="6" fill="url(#accent)"/>
  <circle cx="170" cy="260" r="5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="342" cy="260" r="5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="195" cy="320" r="5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="317" cy="320" r="5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="256" cy="145" r="7" fill="url(#accent)"/>

  <!-- Neural connections between nodes -->
  <line x1="180" y1="200" x2="256" y2="145" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="332" y1="200" x2="256" y2="145" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="200" x2="170" y2="260" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="332" y1="200" x2="342" y2="260" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="260" x2="195" y2="320" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="342" y1="260" x2="317" y2="320" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>

  <!-- Medical cross - center bottom -->
  <rect x="244" y="390" width="24" height="50" rx="4" fill="url(#accent)"/>
  <rect x="237" y="403" width="38" height="24" rx="4" fill="url(#accent)"/>
</svg>
